name: Deploy Encrypted Website

on:
  push:
    branches:
      - main

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Encrypt HTML page
        run: |
          # Jeśli plik analizaII.html istnieje, szyfrujemy go za pomocą hasła z GitHub Secrets.
          if [ -f "docs/analizaII.html" ]; then
            npx staticrypt docs/analizaII.html -p "${{ secrets.EXAM_PASSWORD }}" -d docs --short
            echo "Successfully encrypted docs/analizaII.html"
          else
            echo "Warning: docs/analizaII.html not found! Make sure to run 'quarto render' locally before pushing."
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'docs'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
